# tmux-agent-dashboard — keybindings and hooks
#
# @dashboard_bin is set by tmux-agent-dashboard.tmux before sourcing.

# Defaults for user-overridable options.
if -F '#{==:#{@dashboard_key},}' 'set -g @dashboard_key "ñ"'
if -F '#{==:#{@dashboard_width},}' 'set -g @dashboard_width "90%"'
if -F '#{==:#{@dashboard_height},}' 'set -g @dashboard_height "85%"'

# Binds, built in one shell pass so $bin/$width/$height are baked in:
# tmux 3.5 does not expand `#{...}` inside display-popup's command/`-e`
# args, so the values must be resolved at bind-creation time.
#
#  - prefix + <key>      : open the dashboard popup
#  - left-click status   : `%N` range -> jump to that pane (goto);
#                          `+more` range -> open the popup;
#                          anything else -> default window select
#  - right-click status  : open the dashboard popup (status bar only)
run-shell 'key="$(tmux display-message -p "#{@dashboard_key}")"; \
    width="$(tmux display-message -p "#{@dashboard_width}")"; \
    height="$(tmux display-message -p "#{@dashboard_height}")"; \
    bin="$(tmux display-message -p "#{@dashboard_bin}")"; \
    tmux bind -N "agents dashboard" "$key" \
        display-popup -E -w "$width" -h "$height" "$bin"; \
    tmux bind -n MouseDown1Status if -F "##{m/r:^%[0-9]+$,##{mouse_status_range}}" \
        "run-shell \"$bin goto ##{mouse_status_range}\"" \
        "if -F \"##{==:##{mouse_status_range},+more}\" \"display-popup -E -w $width -h $height $bin\" \"select-window -t=\""; \
    tmux bind -n MouseDown3Status \
        display-popup -E -w "$width" -h "$height" "$bin"'

# Remove any pre-existing seen hooks (idempotent on reload).
run-shell 'tmux show-hooks -g after-select-pane \
    | awk "/@dashboard_bin/ && /seen/ { print \$1 }" \
    | xargs -rn1 tmux set-hook -gu'

# Record `@pane_last_seen_at` whenever the user focuses a pane. The
# dashboard's Responded heuristic compares this against the activity
# log mtime — if the log was touched more recently than last_seen_at,
# the pane shows up as unseen.
set-hook -ga after-select-pane \
    'run-shell -b "\"#{@dashboard_bin}\" seen \"#{pane_id}\""'
